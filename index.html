<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobilidade DF</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        :root {
            --bg-color: #f8fafc; 
            --text-color: #334155;
            --card-bg: #ffffff;
            --card-border: #e2e8f0;
        }

        .conteudo {
            background-color: var(--bg-color);
            color: var(--text-color);
            width: 100%;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            
            /* Ajuste para o Mobile: Alinha no topo e empurra com padding */
            justify-content: flex-start; 
            padding: 12dvh 16px 16px 16px; /* 12% da altura da tela de recuo no topo */
            gap: 32px;
            overflow: hidden;
        }

        .titulo {
            font-size: 2.2rem;
            font-weight: 800;
            text-align: center;
            letter-spacing: -1px;
            flex-shrink: 0;
        }

        .opcoes {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            width: 100%;
            max-width: 320px; /* Um pouco mais estreito para dar mais elegância */
            max-height: 55%;
        }

        .opcao {
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s ease, background-color 0.1s ease;
            user-select: none;
            max-height: calc((100dvh - 200px) / 4); 
        }

        .opcao:active {
            transform: scale(0.95);
            background-color: #f1f5f9;
        }

        /* Ajustes específicos para o Computador / Tablet */
        @media (min-width: 480px) {
            .conteudo {
                justify-content: center; /* Volta a centralizar tudo na tela grande */
                padding: 16px;
                gap: 40px;
            }
            .titulo {
                font-size: 2.8rem;
            }
            .opcoes {
                grid-template-columns: repeat(4, 1fr);
                max-width: 580px;
                max-height: none;
            }
            .opcao {
                font-size: 1rem;
                max-height: none;
                padding: 16px;
            }
        }
    </style>
</head>
<body>

    <main class="conteudo">
        <h1 class="titulo">Mobilidade DF</h1>

        <div class="opcoes">
            <div class="opcao">Linhas e Horários</div>
            <div class="opcao">Mapa de Veículos</div>
            <div class="opcao">Mapa de Paradas</div>
            <div class="opcao">Alertas</div>
            <div class="opcao">Notícias</div>
            <div class="opcao">Linhas Favoritas</div>
            <div class="opcao">Paradas Favoritas</div>
            <div class="opcao">Sobre</div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const opcoes = document.querySelectorAll('.opcao');
            opcoes.forEach(botao => {
                botao.addEventListener('click', () => {
                    console.log(`Clicou em: ${botao.textContent.trim()}`);
                });
            });
        });
    </script>
</body>
</html>
